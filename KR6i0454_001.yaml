body:
  text: 西天中印度摩伽陀國那爛陀寺三藏傳教大師賜紫沙門臣法天奉詔譯如是我聞一時世尊在舍衛國祇樹給孤獨園與大苾芻衆千二百五十人俱爾時世尊告苾芻衆言苾芻一切行遷流如幻不實不得久住無有定相是顛倒法苾芻乃至一切行垢盡無染離一切垢一切衆生乃至蠕動及部多等至壽命盡決定殞滅若彼無生即當無滅若彼長者婆羅門剎帝利種族殊勝豪貴自在財富無量金銀珍寶及諸受用無所乏少雖有父母眷屬親姻知識吏民僮僕皆悉具足至壽命盡亦無能免又復剎帝利授灌頂已為大國王得大自在有大力勢人民無量大地國土皆悉降伏至壽命盡亦復無免又彼仙人林中諸修行者不貪於味食諸果實又復遠離果實修諸苦行至壽命盡亦復無免又彼修諸十善得生四大王天忉利天夜摩天覩史多天樂變化天他化自在天又復修行禪定得梵身天梵輔天大梵天得少光天無量光天極光淨天得少淨天無量淨天及遍淨天得無雲天福生天廣果天無想有情天又彼阿那含得無煩天無熱天善現天善見天色究竟天又彼厭礙色身修無邊虛空三昧等得生空無邊處識無邊處無所有處非想非非想處彼等諸天雖復殊勝非彼不生亦復殞滅若彼三界漏盡已作所作遠離重擔逮得己利盡諸有結得阿羅漢雖復此身亦當棄捨又彼刀兵劫自修一身處於寂靜悟諸因緣得中乘證號辟支佛雖復此身亦當棄捨乃至如來應正等覺十力廣大四智圓明説法無畏正師子吼歷無數勤勞得那羅延身亦復棄捨諸苾芻所謂如彼窯師造作壞器盆甕之類雖復有成定從破壞又如果熟自當墮落生滅之法亦復如是諸苾芻一切有情乃至部多一切含識至壽命盡無免斯者如無有生即當無滅復説偈言如來天中天説是無常法如壞器不堅終趣於破壞同果熟自落有情命如是苾芻今當知生滅宜應怖爾時世尊説是經已諸苾芻衆一心信受歡喜奉行
